environment: 'paper'

exchange:
  name: 'binance'
  sandbox: false
  enable_rate_limit: true
  timeout: 30000
  retry_attempts: 3
  retry_delay: 1000

trading:
  symbols:
    - 'ETH/USDT'
    - 'BNB/USDT'
    - 'BTC/USDT'
  main_timeframe: '15m'
  trend_timeframe: '1h'
  confirmation_timeframe: '5m'
  lookback_period: 300
  max_concurrent_positions: 1
  check_interval_seconds: 60

risk_management:
  risk_percent_per_trade: 2.0
  max_daily_loss_percent: 6.0
  max_consecutive_losses: 3
  cooldown_minutes: 60
  max_leverage: 10
  min_risk_reward_ratio: 2.0
  move_sl_to_breakeven_after_tp1: true
  close_losing_early: false
  close_losing_percent: 5.0

strategy:
  indicators:
    ema_fast: 50
    ema_slow: 200
    ema_medium: 21
  momentum:
    rsi_period: 14
    rsi_long_entry_min: 50
    rsi_long_entry_max: 70
    rsi_short_entry_min: 30
    rsi_short_entry_max: 50
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
  trend:
    adx_period: 14
    adx_threshold: 25
  volatility:
    atr_period: 14
    atr_stop_loss_multiplier: 1.5
    atr_tp1_multiplier: 2.0
    atr_tp2_multiplier: 4.5
    bb_period: 20
    bb_std_dev: 2.0
  volume:
    volume_ma_period: 20
    volume_multiplier: 1.5
  require_higher_high: false
  require_higher_low: false

telegram:
  daily_report_time: '00:00'
  weekly_report_day: 'sunday'
  weekly_report_time: '00:00'
  notifications:
    send_entry_signal: true
    send_exit_signal: true
    send_tp_signals: true
    send_sl_signals: true
    send_error_alerts: true
    send_daily_report: true
    send_weekly_report: true
    send_status_on_startup: true

database:
  type: 'sqlite'
  sqlite:
    path: './data/trading_bot.db'
  auto_backup: true
  backup_interval_days: 7

logging:
  level: 'INFO'
  file:
    enabled: true
    path: './logs/bot.log'
    max_size_mb: 100
    backup_count: 10
  console:
    enabled: true
    format: 'colored'

performance:
  monitor_performance: true
  alert_on_high_latency_ms: 1000
  debug_mode: false
  api_calls_per_second: 10

# ─────────────────────────────────────────────────────────
# خيارات متقدمة (Advanced Options)
# ─────────────────────────────────────────────────────────
advanced:
  use_real_time_prices: true
  kill_weak_trades_early: false
  weak_trade_pnl_percent: -3.0
  use_ml_predictions: false
  ml_confidence_threshold: 0.65
  use_hedging: false
  hedging_ratio: 0.5
